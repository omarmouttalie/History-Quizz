<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Quiz | Portfolio Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Smooch+Sans:wght@300;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="quiz-container">
        <h1>History Quiz</h1>
        <div id="game-section">
            <p id="question">Question text goes here...</p>
            <div class="options-grid" id="options-container">
                <!-- Buttons here -->
            </div>
            <p id="score-area">Score: 0</p>
        </div>

        <div id="result-section" class="hidden">
            <h2>Quiz Finished!</h2>
            <p id="final-score" style="font-size: 2rem;"></p>
            <button id="restart-btn" onclick="startQuiz()">Try Again</button>
        </div>
    </div>

</body>
</html>
